# Example Configuration - Proposal Report
# Full options: docs/input_schema.md

project:
  title: "Project title"
  type: "proposal"

author:
  name: "John Doe"
  roll_number: "2021CS001"
  email: "john.doe@university.edu"

academic:
  supervisor: "Dr. Jane Smith"
  co_supervisor: "" # Optional, leave empty if not applicable
  department: "Department of Computer Science and Engineering"
  university: "Your University Name"
  degree: "Bachelor of Technology"
  session: "2024-25"
  # If you change project.type to "major-project", uncomment and set these (certificate/supervisor lines):
  # supervisor_designation: "Professor"
  # supervisor_department: "Department of Computer Science and Engineering"

dates:
  submission_date: "November 2024"

# Optional formatting options
formatting:
  color_scheme: "blue"
  font_size: 12
  line_spacing: 1.5
  bibliography_style: "IEEE"

# Optional content options
content:
  include_declaration: true
  include_certificate: true
  include_acknowledgments: true
  include_abstract: true
  include_appendix: false

# Optional custom logo (path must exist on disk when set; leave commented to use the default placeholder)
# assets:
#   logo_path: "./path/to/your/logo.png"
