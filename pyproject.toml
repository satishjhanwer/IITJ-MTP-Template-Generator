[tool.black]
line-length = 88
target-version = ["py310", "py311", "py312"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | output
  | htmlcov
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 88
src_paths = ["scripts"]
skip_glob = [".venv/*", "output/*", "htmlcov/*"]

[tool.mypy]
python_version = "3.10"
files = ["scripts"]
explicit_package_bases = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
strict_equality = true
exclude = [
    "\\.venv/",
    "output/",
    "htmlcov/",
]

[tool.pylint.main]
source-roots = ["scripts"]
ignore-paths = ["^\\.venv", "^output", "^htmlcov"]

[tool.pylint.format]
max-line-length = 88

[tool.pylint.messages_control]
disable = [
    "C0301",  # line-too-long — enforced by black/flake8 instead
    "W0511",  # fixme — TODO markers are intentional in templates
    "R0903",  # too-few-public-methods — simple data/error classes are fine
    "R0913",  # too-many-arguments — generator functions legitimately need many args
    "R0914",  # too-many-locals — complex generation logic is acceptable
    "R0801",  # duplicate-code — generate.py and generate_simple.py share logic by design
    "C0415",  # import-outside-toplevel — intentional conditional imports in try/except blocks
]

[[tool.mypy.overrides]]
# generate_simple.py is the zero-dependency fallback; strict typing is not required there
module = "scripts.generate_simple"
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false

[tool.bandit]
targets = ["scripts"]
exclude_dirs = [".venv", "output", "htmlcov", "tests"]
skips = [
    "B101",  # assert-used — acceptable outside tests in this project
    "B603",  # subprocess-without-shell-equals-true — not applicable here
]
